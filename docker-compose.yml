version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tamagotchi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: tamagotchi
      MYSQL_USER: tamagotchi
      MYSQL_PASSWORD: tamagotchi1234
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.0
    container_name: tamagotchi-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data: