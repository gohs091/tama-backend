spring:
  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT}:3306/tamagotchi?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379

tamagotchi:
  hunger:
    increase-threshold-minutes: 30
    increase-amount: 10
