name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Java 17 세팅
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Gradle 빌드
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: EC2 배포
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: build/libs/*.jar
          target: /home/ec2-user/app
          strip_components: 2

      - name: 서버 재시작
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            export RDS_ENDPOINT=${{ secrets.RDS_ENDPOINT }}
            export RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}
            export RDS_USERNAME=${{ secrets.RDS_USERNAME }}
            export REDIS_HOST=${{ secrets.REDIS_HOST }}
            mv /home/ec2-user/app/*.jar /home/ec2-user/app/tamagotchi.jar 2>/dev/null || true
            sh /home/ec2-user/app/deploy.sh